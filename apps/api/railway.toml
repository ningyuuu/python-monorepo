[build]
builder = "dockerfile"
buildCommand = "uv sync --package monorepo-api --dev"

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
startCommand = "uv run --project apps/api uvicorn api_service.main:app --host 0.0.0.0 --port 8000"

[environments.production]
buildCommand = "uv sync --package monorepo-api --dev"
startCommand = "uv run --project apps/api uvicorn api_service.main:app --host 0.0.0.0 --port 8000"