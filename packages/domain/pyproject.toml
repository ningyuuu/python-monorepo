[project]
name = "monorepo-domain"
version = "0.1.0"
description = "Reusable domain logic for python-monorepo"
requires-python = ">=3.12"
dependencies = ["monorepo-contracts"]

[tool.uv.sources]
monorepo-contracts = { workspace = true }

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/monorepo_domain"]
