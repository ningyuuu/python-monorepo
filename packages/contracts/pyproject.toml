[project]
name = "monorepo-contracts"
version = "0.1.0"
description = "Shared data contracts for python-monorepo"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.11.7"]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/monorepo_contracts"]
