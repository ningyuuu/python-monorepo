[project]
name = "monorepo-blob"
version = "0.1.0"
description = "Blob storage helpers for python-monorepo"
requires-python = ">=3.12"
dependencies = [
  "monorepo-core",
  "vercel-blob>=0.4.2",
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/blob"]

[tool.uv.sources]
monorepo-core = { workspace = true }
