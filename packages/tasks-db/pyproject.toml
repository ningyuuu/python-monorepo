[project]
name = "monorepo-tasks-db"
version = "0.1.0"
description = "Shared task persistence helpers for python-monorepo"
requires-python = ">=3.12"
dependencies = [
  "monorepo-core",
  "psycopg[binary]>=3.2.10",
  "sqlalchemy>=2.0.43",
]

[tool.uv.sources]
monorepo-core = { workspace = true }

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tasks_db"]
